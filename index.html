                                                <li className="flex items-start leading-relaxed"><div className="w-2 h-2 rounded-full bg-teal-500 mt-2 mr-3 flex-shrink-0"></div><span>Notificar todo caso probable al departamento de vigilancia epidemiológica de manera <span className="font-black text-teal-800">inmediata (&lt;24 horas)</span>.</span></li>
                                                <li className="flex items-start leading-relaxed"><div className="w-2 h-2 rounded-full bg-teal-500 mt-2 mr-3 flex-shrink-0"></div>Llenar el estudio epidemiológico de enfermedades transmitidas por vector.</li>
                                                <li className="flex items-start leading-relaxed"><div className="w-2 h-2 rounded-full bg-teal-500 mt-2 mr-3 flex-shrink-0"></div><span>Llenar el <span className="font-black text-teal-800">formato N1</span> registrando datos completos: nombre, fecha de nacimiento, edad, dirección, teléfono, localidad, fechas de viajes, etc.</span></li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex justify-center py-6">
                                    <div className="bg-slate-100 rounded-full p-2 border-2 border-slate-200">
                                        <i data-lucide="arrow-down" className="text-slate-400 w-8 h-8"></i>
                                    </div>
                                </div>

                                {/* 8. Conservación y Envío */}
                                <div className="bg-white rounded-3xl border-2 border-orange-200 shadow-sm overflow-hidden">
                                    <div className="bg-[#ea580c] p-4 text-white">
                                        <h3 className="font-black text-base uppercase tracking-widest flex items-center justify-center"><span className="bg-white text-[#ea580c] w-8 h-8 rounded-full inline-flex items-center justify-center mr-3">8</span> CONSERVACIÓN Y ENVÍO DE MUESTRAS AL LABORATORIO</h3>
                                    </div>
                                    <div className="p-8">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 text-center">
                                            <div className="flex flex-col items-center bg-orange-50/50 p-6 rounded-2xl border border-orange-100">
                                                <p className="font-black text-orange-900 mb-4 text-lg border-b border-orange-200 pb-2 w-full">1. Secado</p>
                                                <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-4 text-orange-500 shadow-sm border border-orange-100"><i data-lucide="wind" className="w-10 h-10"></i></div>
                                                <p className="text-sm text-slate-700 leading-relaxed font-medium">Asegurar que los portaobjetos estén completamente secos al aire.</p>
                                            </div>
                                            <div className="flex flex-col items-center bg-orange-50/50 p-6 rounded-2xl border border-orange-100">
                                                <p className="font-black text-orange-900 mb-4 text-lg border-b border-orange-200 pb-2 w-full">2. Protección</p>
                                                <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-4 text-orange-500 shadow-sm border border-orange-100"><i data-lucide="mail" className="w-10 h-10"></i></div>
                                                <p className="text-sm text-slate-700 leading-relaxed font-medium">Colocar cada portaobjetos envuelto en el Formato N1 y enviar con el estudio epidemiológico.</p>
                                            </div>
                                            <div className="flex flex-col items-center bg-orange-50/50 p-6 rounded-2xl border border-orange-100">
                                                <p className="font-black text-orange-900 mb-4 text-lg border-b border-orange-200 pb-2 w-full">3. Envío</p>
                                                <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-4 text-orange-500 shadow-sm border border-orange-100"><i data-lucide="truck" className="w-10 h-10"></i></div>
                                                <p className="text-sm text-slate-700 leading-relaxed font-medium">Enviar al laboratorio de la jurisdicción / estatal lo antes posible (idealmente &lt; 24 h). No exponer a calor extremo ni humedad.</p>
                                            </div>
                                            <div className="flex flex-col items-center bg-orange-50/50 p-6 rounded-2xl border border-orange-100">
                                                <p className="font-black text-orange-900 mb-4 text-lg border-b border-orange-200 pb-2 w-full">4. Recepción en laboratorio</p>
                                                <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-4 text-orange-500 shadow-sm border border-orange-100"><i data-lucide="microscope" className="w-10 h-10"></i></div>
                                                <p className="text-sm text-slate-700 leading-relaxed font-medium">El laboratorio confirmará la recepción y realizará procesamiento.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex justify-center py-6">
                                    <div className="bg-slate-100 rounded-full p-2 border-2 border-slate-200">
                                        <i data-lucide="arrow-down" className="text-slate-400 w-8 h-8"></i>
                                    </div>
                                </div>

                                {/* 9. Interpretación de Resultados */}
                                <div className="bg-white rounded-3xl border-2 border-[#1e3a8a] shadow-sm overflow-hidden mb-12">
                                    <div className="bg-[#1e3a8a] p-4 text-white">
                                        <h3 className="font-black text-base uppercase tracking-widest flex items-center justify-center"><span className="bg-white text-[#1e3a8a] w-8 h-8 rounded-full inline-flex items-center justify-center mr-3">9</span> INTERPRETACIÓN DE RESULTADOS (LABORATORIO)</h3>
                                    </div>
                                    <div className="p-0 grid grid-cols-1 md:grid-cols-3 divide-y md:divide-y-0 md:divide-x divide-slate-200">
                                        <div className="p-8 flex flex-col bg-green-50/30">
                                            <h4 className="text-center font-black text-green-700 uppercase mb-6 text-xl tracking-widest">POSITIVO</h4>
                                            <div className="flex items-start space-x-4">
                                                <i data-lucide="check-circle-2" className="w-12 h-12 text-green-500 flex-shrink-0 mt-1"></i>
                                                <ul className="space-y-4 text-sm text-slate-700 font-medium leading-relaxed">
                                                    <li>• Reportar especie (<i className="italic">P. vivax, P. falciparum, P. malariae, P. ovale</i>) y densidad parasitaria.</li>
                                                    <li>• Notificar inmediatamente como <span className="font-black text-green-800 bg-green-100 px-2 py-1 rounded">CASO CONFIRMADO</span>.</li>
                                                    <li>• Iniciar/continuar tratamiento específico según Norma Oficial Mexicana y guías vigentes.</li>  
                                                      <li>• Personal del Programa de Vectores Estatal proporcionara el tratamiento.</li>
                                                </ul>
                                            </div>
                                        </div>
                                        <div className="p-8 flex flex-col bg-amber-50/30">
                                            <h4 className="text-center font-black text-amber-600 uppercase mb-6 text-xl tracking-widest">NEGATIVO</h4>
                                            <div className="flex items-center justify-center space-x-4 mt-6">
                                                <i data-lucide="minus-circle" className="w-12 h-12 text-amber-500 flex-shrink-0"></i>
                                                <p className="text-base text-slate-700 font-bold leading-relaxed">• Buscar otros diagnósticos diferenciales.</p>
                                            </div>
                                        </div>
                                        <div className="p-8 flex flex-col bg-slate-50/50">
                                            <h4 className="text-center font-black text-slate-600 uppercase mb-6 text-xl tracking-widest">NO CONCLUYENTE / INADECUADA</h4>
                                            <div className="flex items-center justify-center space-x-4 mt-6">
                                                <i data-lucide="help-circle" className="w-12 h-12 text-slate-400 flex-shrink-0"></i>
                                                <p className="text-base text-slate-700 font-bold leading-relaxed">• Repetir toma de muestra lo antes posible y reenviar al laboratorio.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* FOOTER DEL ALGORITMO */}
                                <div className="bg-white rounded-3xl border border-slate-200 shadow-sm p-8 grid grid-cols-1 md:grid-cols-3 gap-8 text-sm mb-8">
                                    <div className="border-b md:border-b-0 md:border-r border-slate-200 pb-6 md:pb-0 md:pr-6">
                                        <h5 className="font-black text-slate-800 mb-4 flex items-center text-base"><i data-lucide="clipboard-list" className="w-5 h-5 mr-2 text-slate-500"></i> NOTAS IMPORTANTES</h5>
                                        <ul className="space-y-2 text-slate-600 leading-relaxed font-medium">
                                            <li>• La gota gruesa es más sensible; el extendido permite identificar especie.</li>
                                            <li>• La calidad de la muestra es clave para el diagnóstico.</li>
                                            <li>• La oportunidad en la toma, envío y notificación fortalece la vigilancia.</li>
                                            <li>• Todo el personal debe utilizar precauciones universales.</li>
                                        </ul>
                                    </div>
                                    <div className="border-b md:border-b-0 md:border-r border-slate-200 pb-6 md:pb-0 md:px-6">
                                        <h5 className="font-black text-slate-800 mb-4 text-base">ABREVIATURAS</h5>
                                        <ul className="space-y-3 text-slate-600 leading-relaxed">
                                            <li><span className="font-black text-slate-800 bg-slate-100 px-2 py-0.5 rounded">µL:</span> microlitro</li>
                                            <li><span className="font-black text-slate-800 bg-slate-100 px-2 py-0.5 rounded">h:</span> hora(s)</li>
                                            <li><span className="font-black text-slate-800 bg-slate-100 px-2 py-0.5 rounded">SUIVE:</span> Sistema Único de Información para la Vigilancia Epidemiológica</li>
                                            <li><span className="font-black text-slate-800 bg-slate-100 px-2 py-0.5 rounded">SINAVE:</span> Sistema Nacional de Vigilancia Epidemiológica</li>
                                        </ul>
                                    </div>
                                    <div className="md:pl-6">
                                        <h5 className="font-black text-slate-800 mb-2 text-base">ZONAS ENDÉMICAS EN MÉXICO</h5>
                                        <p className="text-slate-500 mb-4 font-bold text-xs uppercase tracking-widest">(Transmisión de paludismo)</p>
                                        <ul className="grid grid-cols-2 gap-y-3 gap-x-4 text-slate-700 font-bold list-disc list-inside bg-slate-50 p-4 rounded-xl border border-slate-100">
                                            <li>Chiapas</li>
                                            <li>Oaxaca</li>
                                            <li>Tabasco</li>
                                            <li>Sinaloa</li>
                                            <li>Campeche</li>
                                            <li>Chihuahua</li>
                                        </ul>
                                    </div>
                                </div>

                                {/* Banner de Alerta Final */}
                                <div className="bg-green-700 text-white p-6 rounded-3xl shadow-lg flex items-center justify-center space-x-4 text-center mt-6">
                                    <i data-lucide="alert-triangle" className="w-8 h-8 flex-shrink-0 text-green-300"></i>
                                    <p className="font-black text-base md:text-xl uppercase tracking-widest leading-relaxed">
                                        ANTE FIEBRE EN PERSONA PROCEDENTE DE ZONA ENDÉMICA: <br className="hidden md:block"/> ¡PIENSA EN PALUDISMO, CONFIRMA Y NOTIFICA!
                                    </p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'tratamiento' && (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white p-8 rounded-3xl border-2 border-blue-100 shadow-sm relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-4 opacity-5 text-blue-600"><i data-lucide="shield" className="lucide-lg"></i></div>
                                        <h3 className="text-xl font-black text-blue-800 uppercase italic mb-4">Tratamiento de Cura Radical (TCR)</h3>
                                        <div className="space-y-4 text-sm text-slate-700">
                                            <p className="font-bold flex items-center text-blue-600"><i data-lucide="check-circle-2" className="mr-2"></i> Cloroquina + Primaquina</p>
                                            <div className="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                                                <p className="font-black text-blue-900 mb-1">Esquema 14 días:</p>
                                                <p>Pacientes en entidades federativas con <span className="font-bold uppercase tracking-tighter">baja o nula transmisión</span>.</p>
                                            </div>
                                            <div className="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                                                <p className="font-black text-blue-900 mb-1">Esquema 7 días:</p>
                                                <p>Pacientes en entidades federativas donde <span className="font-bold uppercase tracking-tighter">continúa la endemicidad. Nuevo León utiliza este esquema(excepción)</span>.</p>
                                            </div>
                                            <p className="text-[10px] text-slate-400 italic uppercase">Para casos autóctonos causados por Plasmodium vivax y Plasmodium ovale.</p>
                                        </div>
                                    </div>

                                    <div className="bg-white p-8 rounded-3xl border-2 border-orange-100 shadow-sm relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-4 opacity-5 text-orange-600"><i data-lucide="activity" className="lucide-lg"></i></div>
                                        <h3 className="text-xl font-black text-orange-800 uppercase italic mb-4">Tratamiento Plasmodium Falciparum y Grave</h3>
                                        <div className="space-y-4 text-sm text-slate-700">
                                            <div className="p-4 bg-orange-50 rounded-2xl border border-orange-100">
                                                <p className="font-black text-orange-900 mb-1">Plasmodium falciparum (Coartem):</p>
                                                <p>Composición a dosis fija de <span className="font-bold">Artemeter con Lumefantrina</span>.</p>
                                            </div>
                                            <div className="p-4 bg-red-50 rounded-2xl border border-red-100">
                                                <p className="font-black text-red-900 mb-1">Paludismo Grave:</p>
                                                <p className="mb-2">Requiere tratamiento en <span className="font-black text-red-600">NIVEL HOSPITALARIO</span>.</p>
                                                <p>Manejo inicial con <span className="font-bold uppercase">Artesunato</span> y continuación con 3 días de Coartem.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-slate-800 p-8 rounded-3xl text-white shadow-xl">
                                    <div className="flex items-center space-x-3 mb-4">
                                        <i data-lucide="alert-circle" className="text-orange-400"></i>
                                        <h3 className="text-lg font-black uppercase italic tracking-widest">Seguimiento Hemático</h3>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-xs">
                                        <div className="space-y-2 opacity-90">
                                            <p className="font-bold text-orange-400 uppercase tracking-widest">Casos Plasmodium vivax:</p>
                                            <p className="leading-relaxed">Muestreo a los <span className="text-white font-black">3, 7, 14, 21 y 28 días</span> a partir del término del tratamiento, y posteriormente <span className="text-white font-black">mensual por un año</span>.</p>
                                        </div>
                                        <div className="space-y-2 opacity-90">
                                            <p className="font-bold text-orange-400 uppercase tracking-widest">Casos Plasmodium falciparum:</p>
                                            <p className="leading-relaxed text-balance italic">Cada 6 horas hasta asegurar la eliminación de la carga parasitaria.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="mt-12 pt-6 border-t border-slate-200 text-center">
                            <p className="text-[10px] font-black uppercase text-slate-400 tracking-[0.2em]">Fuente: Guía de Lineamientos Operativos para Paludismo en México</p>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
